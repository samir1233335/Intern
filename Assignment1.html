<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinema Booking Form</title>
</head>

<body>

    <h1>Cinema Ticket Reservation</h1>
    <p>Please fill out the details below to reserve your movie tickets.</p>

    <form>

        <label for="name">Customer Name:</label><br>
        <input type="text" id="name" name="name" placeholder="Enter your full name" required>
        <br><br>

        <label for="mail">Email Address:</label><br>
        <input type="email" id="mail" name="mail" placeholder="abc@example.com" required>
        <br><br>

        <label for="mobile">Contact Number:</label><br>
        <input type="tel" id="mobile" name="mobile" placeholder="98XXXXXXXX">
        <br><br>

        <label for="film">Choose a Movie:</label><br>
        <select id="film" name="film">
            <option value="">Select Movie</option>
            <option>Doctor Strange</option>
            <option>Fast X</option>
            <option>John Wick 4</option>
        </select>
        <br><br>

        <label for="showdate">Booking Date:</label><br>
        <input type="date" id="showdate" name="showdate">
        <br><br>

        <label for="showtime">Show Time:</label><br>
        <input type="time" id="showtime" name="showtime">
        <br><br>

        <label for="quantity">Ticket Quantity:</label><br>
        <input type="number" id="quantity" name="quantity" min="1" max="10">
        <br><br>

        <label>Seat Category:</label><br>
        <input type="radio" name="category" value="standard"> Standard
        <input type="radio" name="category" value="vip"> VIP
        <input type="radio" name="category" value="deluxe"> Deluxe
        <br><br>

        <label>Snacks Required:</label><br>
        <input type="checkbox" name="snacks" value="popcorn"> Popcorn
        <input type="checkbox" name="snacks" value="drink"> Soft Drink
        <input type="checkbox" name="snacks" value="burger"> Burger
        <br><br>

        <label for="message">Additional Notes:</label><br>
        <textarea id="message" rows="4" cols="35"
                  placeholder="Enter any special requests"></textarea>
        <br><br>

        <button type="submit">Book Ticket</button>
        <button type="reset">Clear Form</button>

    </form>

</body>
</html>
